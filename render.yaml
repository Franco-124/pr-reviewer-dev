services:
  - type: web
    name: pr-reviewer-dev
    runtime: python
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GITHUB_APP_ID
        sync: false
      - key: GITHUB_APP_INSTALLATION_ID
        sync: false
      - key: GITHUB_WEBHOOK_SECRET
        sync: false
      - key: GITHUB_PRIVATE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LLM_MODEL_NAME
        value: gpt-4.1-mini
